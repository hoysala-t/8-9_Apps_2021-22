<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>8th & 9th Standard Application 2021-22</h2>
<p>Please verify the data carefully before submission</p>

<div class="container">
<iframe name='hidden-iframe' style='display: none'></iframe>
<form id='google-form' method='post' target='hidden-iframe' action='https://script.google.com/macros/s/AKfycbxIRhWpcU_yNILV0x4qoGnPV5h3wYVa0Y42mqVyEtDij6xj5EHxaS6NyiHiDq4qCyEuGA/exec'>
    <div class="row">
      <div class="col-25">
        <label>SATS No</label>
      </div>
      <div class="col-75">
        <input type="number" name="SATS" required>
      </div>
    </div>
    <div class="row">
      <div class="col-25">
        <label>Student Name</label>
      </div>
      <div class="col-75">
        <input type="text" name="Name" required>
      </div>
    </div>
    <div class="row">
      <div class="col-25">
        <label>Date of Birth</label>
      </div>
      <div class="col-75">
        <input type="date" name="DOB" required>
      </div>
    </div>
    <div class="row">
      <div class="col-25">
        <label>Gender</label>
      </div>
      <div class="col-75">
        <select name="Sex">
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>
    </div>
    <br>
    <div class="row">
      <input type="submit" value="Submit">
    </div>
  </form>
</div>
</body>
</html>
